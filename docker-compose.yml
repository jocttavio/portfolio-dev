
services:
  app:
    container_name: portfolio-octavio-container
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: docker.io/octavio/portfolio-image:1.0
    ports:
      - "3000:3000"  # Mapea puerto 3000 (host) → 3000 (contenedor)
    networks:
      - nginx-network

networks:
  nginx-network:
    driver: bridge
    external: true